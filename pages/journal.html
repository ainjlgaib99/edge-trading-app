<div class="page-inner">
  <div class="page-header">
    <div>
      <h1 class="page-title">Journal</h1>
      <p class="page-sub">Every trade. No exceptions.</p>
    </div>
    <button class="btn btn-primary" onclick="navigate('log')">+ Log Trade</button>
  </div>

  <!-- Stats bar -->
  <div class="stat-grid" style="margin-bottom:var(--space-4);">
    <div class="card stat-card"><div class="stat-label">Total Trades</div><div class="stat-value" id="js_total">—</div></div>
    <div class="card stat-card"><div class="stat-label">Win Rate</div><div class="stat-value" id="js_wr">—</div></div>
    <div class="card stat-card"><div class="stat-label">Avg R:R</div><div class="stat-value mono" id="js_rr">—</div></div>
    <div class="card stat-card"><div class="stat-label">Total P&L</div><div class="stat-value mono" id="js_pnl">—</div></div>
  </div>

  <!-- Filter bar -->
  <div class="card" style="margin-bottom:var(--space-4);">
    <div style="display:flex;gap:var(--space-3);flex-wrap:wrap;align-items:center;">
      <input class="form-input" type="date" id="f_start" style="width:auto;" onchange="loadJournal()">
      <input class="form-input" type="date" id="f_end" style="width:auto;" onchange="loadJournal()">
      <select class="form-select" id="f_instrument" style="width:auto;" onchange="loadJournal()">
        <option value="all">All Instruments</option>
        <option value="MNQ">MNQ</option>
        <option value="MES">MES</option>
      </select>
      <select class="form-select" id="f_setup" style="width:auto;" onchange="loadJournal()">
        <option value="all">All Setups</option>
        <option value="VAH Rejection">VAH Rejection</option>
        <option value="VAL Bounce">VAL Bounce</option>
        <option value="POC Retest Long">POC Retest Long</option>
        <option value="POC Retest Short">POC Retest Short</option>
        <option value="Second Tap">Second Tap</option>
        <option value="Other">Other</option>
      </select>
      <select class="form-select" id="f_result" style="width:auto;" onchange="loadJournal()">
        <option value="all">All Results</option>
        <option value="Win">Wins</option>
        <option value="Loss">Losses</option>
        <option value="Breakeven">Breakeven</option>
      </select>
      <button class="btn btn-ghost btn-sm" onclick="clearFilters()">Clear</button>
    </div>
  </div>

  <!-- Trade list -->
  <div class="card" style="margin-bottom:var(--space-4);">
    <div id="tradeList">
      <div style="text-align:center;padding:var(--space-8);color:var(--muted);">Loading...</div>
    </div>
  </div>

  <!-- Analytics: by Setup -->
  <div id="setupAnalytics" style="display:none;">
    <div class="card" style="margin-bottom:var(--space-4);">
      <div class="card-header">Performance by Setup</div>
      <div id="setupBreakdown"></div>
    </div>

    <!-- Analytics: by Emotion -->
    <div class="card">
      <div class="card-header">Emotional Patterns</div>
      <div id="emotionBreakdown"></div>
    </div>
  </div>

</div>

<script>
let _allTrades = [];

async function init_journal() {
  const session = getAppSession();
  if (!session) return;
  try {
    _allTrades = await getTrades(session.user.id);
    updateStats(_allTrades);
    renderTradeList(_allTrades);
    renderAnalytics(_allTrades);
  } catch(e) { console.error(e); }
}

async function loadJournal() {
  const session = getAppSession();
  if (!session) return;
  const filters = {
    startDate: document.getElementById('f_start').value || null,
    endDate: document.getElementById('f_end').value || null,
    instrument: document.getElementById('f_instrument').value,
    setup: document.getElementById('f_setup').value,
    result: document.getElementById('f_result').value,
  };
  try {
    const trades = await getTrades(session.user.id, filters);
    updateStats(trades);
    renderTradeList(trades);
  } catch(e) { console.error(e); }
}

function clearFilters() {
  ['f_start','f_end'].forEach(id => document.getElementById(id).value = '');
  ['f_instrument','f_setup','f_result'].forEach(id => document.getElementById(id).value = 'all');
  updateStats(_allTrades);
  renderTradeList(_allTrades);
}

function updateStats(trades) {
  const wins = trades.filter(t => t.result === 'Win').length;
  const totalPnl = trades.reduce((s, t) => s + (t.pnl || 0), 0);
  const rrVals = trades.filter(t => t.actual_rr != null && t.result === 'Win').map(t => t.actual_rr);
  const avgRR = rrVals.length ? (rrVals.reduce((a,b)=>a+b,0)/rrVals.length).toFixed(2) : '—';
  const wr = trades.length ? ((wins/trades.length)*100).toFixed(0) : '0';

  document.getElementById('js_total').textContent = trades.length;
  const wrEl = document.getElementById('js_wr');
  wrEl.textContent = `${wr}%`;
  wrEl.style.color = wr >= 60 ? 'var(--green)' : wr >= 40 ? 'var(--text)' : 'var(--red)';
  document.getElementById('js_rr').textContent = avgRR !== '—' ? `${avgRR}R` : '—';
  const pEl = document.getElementById('js_pnl');
  pEl.textContent = `${totalPnl >= 0 ? '+' : ''}$${Math.abs(totalPnl).toFixed(0)}`;
  pEl.style.color = totalPnl >= 0 ? 'var(--green)' : 'var(--red)';
}

function renderTradeList(trades) {
  const el = document.getElementById('tradeList');
  if (!trades.length) {
    el.innerHTML = `<div style="text-align:center;padding:var(--space-8);color:var(--muted);font-size:var(--text-sm);">No trades match your filters.</div>`;
    return;
  }

  el.innerHTML = trades.map((t, i) => {
    const isWin = t.result === 'Win', isLoss = t.result === 'Loss';
    const pnlColor = isWin ? 'var(--green)' : isLoss ? 'var(--red)' : 'var(--muted)';
    const dir = t.direction === 'Long' ? '▲' : '▼';
    const dirColor = t.direction === 'Long' ? 'var(--green)' : 'var(--red)';
    const rulesIcon = t.followed_rules ? '<span style="color:var(--green)">✓</span>' : '<span style="color:var(--red)">✕</span>';
    const sign = (t.pnl||0) >= 0 ? '+' : '';
    return `
      <div class="trade-row" onclick="toggleTradeDetail('${t.id}')" style="cursor:pointer;">
        <div style="display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) 0;border-bottom:1px solid var(--border);">
          <span style="color:${dirColor};width:16px;text-align:center;flex-shrink:0;">${dir}</span>
          <div style="flex:1;min-width:0;">
            <div style="font-size:var(--text-sm);font-weight:500;">${t.setup_type}</div>
            <div style="font-size:var(--text-xs);color:var(--muted);">${t.instrument} · ${t.date} · ${t.emotional_state || '—'}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <div style="font-family:var(--font-mono);font-size:var(--text-sm);font-weight:600;color:${pnlColor};">${sign}$${Math.abs(t.pnl||0)}</div>
            <div style="font-size:var(--text-xs);color:var(--muted);">${rulesIcon} ${t.trade_grade || 'B'}</div>
          </div>
        </div>
        <div id="detail_${t.id}" style="display:none;padding:var(--space-3) 0 var(--space-4) 24px;border-bottom:1px solid var(--border);">
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-3);margin-bottom:var(--space-3);font-size:var(--text-xs);">
            <div><span style="color:var(--muted)">Entry: </span>${t.entry_price || '—'}</div>
            <div><span style="color:var(--muted)">Stop: </span>${t.stop_price || '—'}</div>
            <div><span style="color:var(--muted)">Target: </span>${t.target_price || '—'}</div>
            <div><span style="color:var(--muted)">Exit: </span>${t.exit_price || '—'}</div>
            <div><span style="color:var(--muted)">Planned RR: </span>${t.planned_rr ? `1:${t.planned_rr}` : '—'}</div>
            <div><span style="color:var(--muted)">Actual RR: </span>${t.actual_rr ? `1:${t.actual_rr}` : '—'}</div>
          </div>
          ${t.rules_broken?.length ? `<div style="font-size:var(--text-xs);color:var(--red);margin-bottom:var(--space-2);">Rules broken: ${t.rules_broken.join(', ')}</div>` : ''}
          ${t.notes ? `<div style="font-size:var(--text-xs);color:var(--muted);margin-bottom:var(--space-2);">${t.notes}</div>` : ''}
          ${t.screenshot ? `<a href="${t.screenshot}" target="_blank" style="font-size:var(--text-xs);color:var(--accent);">View chart →</a>` : ''}
          <div style="display:flex;gap:var(--space-2);margin-top:var(--space-3);">
            <button class="btn btn-danger btn-sm" onclick="deleteTradeEntry('${t.id}',event)">Delete</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function toggleTradeDetail(id) {
  const el = document.getElementById('detail_' + id);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function deleteTradeEntry(id, e) {
  e.stopPropagation();
  const ok = await confirmDialog('Delete this trade? Cannot be undone.');
  if (!ok) return;
  try {
    await deleteTrade(id);
    _allTrades = _allTrades.filter(t => t.id !== id);
    toast('Trade deleted', 'success');
    updateStats(_allTrades);
    renderTradeList(_allTrades);
    renderAnalytics(_allTrades);
  } catch(err) { toast('Error: ' + err.message, 'error'); }
}

function renderAnalytics(trades) {
  if (trades.length < 2) {
    document.getElementById('setupAnalytics').style.display = 'none';
    return;
  }
  document.getElementById('setupAnalytics').style.display = 'block';

  // By setup
  const bySetup = {};
  trades.forEach(t => {
    const s = t.setup_type || 'Other';
    if (!bySetup[s]) bySetup[s] = { trades: 0, wins: 0, pnl: 0 };
    bySetup[s].trades++;
    if (t.result === 'Win') bySetup[s].wins++;
    bySetup[s].pnl += t.pnl || 0;
  });
  const setupRows = Object.entries(bySetup).sort((a,b) => b[1].pnl - a[1].pnl);
  document.getElementById('setupBreakdown').innerHTML = setupRows.map(([name, d]) => {
    const wr = d.trades ? ((d.wins/d.trades)*100).toFixed(0) : 0;
    const pnlColor = d.pnl >= 0 ? 'var(--green)' : 'var(--red)';
    const sign = d.pnl >= 0 ? '+' : '';
    return `<div style="display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) 0;border-bottom:1px solid var(--border);">
      <div style="flex:1;font-size:var(--text-sm);">${name}</div>
      <div style="font-size:var(--text-xs);color:var(--muted);">${d.trades} trades · ${wr}% win</div>
      <div style="font-family:var(--font-mono);font-size:var(--text-sm);font-weight:600;color:${pnlColor};">${sign}$${Math.abs(d.pnl).toFixed(0)}</div>
    </div>`;
  }).join('');

  // By emotion
  const byEmotion = {};
  trades.forEach(t => {
    const e2 = t.emotional_state || 'Calm';
    if (!byEmotion[e2]) byEmotion[e2] = { trades: 0, wins: 0, pnl: 0 };
    byEmotion[e2].trades++;
    if (t.result === 'Win') byEmotion[e2].wins++;
    byEmotion[e2].pnl += t.pnl || 0;
  });
  const emotionRows = Object.entries(byEmotion).sort((a,b) => b[1].pnl - a[1].pnl);
  document.getElementById('emotionBreakdown').innerHTML = emotionRows.map(([name, d]) => {
    const wr = d.trades ? ((d.wins/d.trades)*100).toFixed(0) : 0;
    const pnlColor = d.pnl >= 0 ? 'var(--green)' : 'var(--red)';
    const sign = d.pnl >= 0 ? '+' : '';
    return `<div style="display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) 0;border-bottom:1px solid var(--border);">
      <div style="flex:1;font-size:var(--text-sm);">${name}</div>
      <div style="font-size:var(--text-xs);color:var(--muted);">${d.trades} trades · ${wr}% win</div>
      <div style="font-family:var(--font-mono);font-size:var(--text-sm);font-weight:600;color:${pnlColor};">${sign}$${Math.abs(d.pnl).toFixed(0)}</div>
    </div>`;
  }).join('');
}
</script>
