<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — EDGE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body class="auth-page">

<div class="auth-card">

  <div class="auth-logo">
    <div class="auth-logo-mark">EDGE.</div>
    <div class="auth-logo-sub">Trading Playbook</div>
  </div>

  <div class="auth-title" id="pageTitle">Reset Password</div>

  <div class="auth-error" id="authMessage"></div>

  <!-- Request reset form -->
  <form id="requestForm" onsubmit="handleRequest(event)">
    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input class="form-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email">
    </div>
    <button class="btn btn-primary btn-full btn-lg" type="submit" id="requestBtn">
      <span id="requestText">Send Reset Link</span>
      <span class="loading-spinner" id="reqSpinner" style="display:none;width:14px;height:14px;border-width:2px;"></span>
    </button>
  </form>

  <!-- New password form (shown after redirect from email) -->
  <form id="newPassForm" style="display:none" onsubmit="handleNewPass(event)">
    <div class="form-group">
      <label class="form-label" for="newPassword">New Password</label>
      <input class="form-input" type="password" id="newPassword" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label class="form-label" for="confirmPassword">Confirm Password</label>
      <input class="form-input" type="password" id="confirmPassword" placeholder="••••••••" required autocomplete="new-password">
    </div>
    <button class="btn btn-primary btn-full btn-lg" type="submit" id="newPassBtn">
      <span id="newPassText">Update Password</span>
      <span class="loading-spinner" id="newPassSpinner" style="display:none;width:14px;height:14px;border-width:2px;"></span>
    </button>
  </form>

  <div class="auth-links">
    <a href="login.html">Back to Sign In</a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script>

const msgEl = document.getElementById('authMessage');

// Check if this is a password update redirect (hash contains access_token)
if (location.hash.includes('access_token') || location.hash.includes('type=recovery')) {
  document.getElementById('requestForm').style.display = 'none';
  document.getElementById('newPassForm').style.display = 'block';
  document.getElementById('pageTitle').textContent = 'New Password';
}

async function handleRequest(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const btn   = document.getElementById('requestBtn');
  const txt   = document.getElementById('requestText');
  const spin  = document.getElementById('reqSpinner');

  msgEl.className = 'auth-error';
  btn.disabled    = true;
  txt.style.display  = 'none';
  spin.style.display = 'inline-block';

  try {
    await resetPassword(email);
    msgEl.style.color = 'var(--green)';
    msgEl.textContent = 'Reset link sent — check your inbox.';
    msgEl.classList.add('visible');
    document.getElementById('requestForm').style.display = 'none';
  } catch (err) {
    msgEl.style.color = '';
    msgEl.textContent = err.message || 'Failed to send reset email.';
    msgEl.classList.add('visible');
  } finally {
    btn.disabled       = false;
    txt.style.display  = 'inline';
    spin.style.display = 'none';
  }
}

async function handleNewPass(e) {
  e.preventDefault();
  const newPass  = document.getElementById('newPassword').value;
  const confirm  = document.getElementById('confirmPassword').value;
  const btn      = document.getElementById('newPassBtn');
  const txt      = document.getElementById('newPassText');
  const spin     = document.getElementById('newPassSpinner');

  msgEl.className = 'auth-error';

  if (newPass !== confirm) {
    msgEl.textContent = 'Passwords do not match.';
    msgEl.classList.add('visible');
    return;
  }

  btn.disabled       = true;
  txt.style.display  = 'none';
  spin.style.display = 'inline-block';

  try {
    await updatePassword(newPass);
    msgEl.style.color = 'var(--green)';
    msgEl.textContent = 'Password updated! Redirecting...';
    msgEl.classList.add('visible');
    setTimeout(() => { window.location.href = '/'; }, 1500);
  } catch (err) {
    msgEl.style.color = '';
    msgEl.textContent = err.message || 'Failed to update password.';
    msgEl.classList.add('visible');
  } finally {
    btn.disabled       = false;
    txt.style.display  = 'inline';
    spin.style.display = 'none';
  }
}

</script>
</body>
</html>
